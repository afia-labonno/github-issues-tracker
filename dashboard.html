<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Traker | Dashboard</title>

    <!-- Tailwind + Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <!-- navbar -->
    <nav class="flex justify-between items-center space-y-4 px-8 py-3 w-full mx-auto">
        <!--left  -->
        <div class="flex gap-1 items-center">
            <i class="fa-brands fa-github"></i>
            <h1 class="font-semibold">GitHub Issues Tracker</h1>
        </div>

        <!-- right -->
        <div class="flex items-center">
            <div class="join">
                <label class="input validator join-item">
                    <input id="input-search" type="text" placeholder="Search Issue" required />
                </label>
                <button id="search-btn" class="btn btn-primary join-item">Search</button>
            </div>
        </div>

    </nav> 
    <hr class="text-base-300">

</body>

</html>
