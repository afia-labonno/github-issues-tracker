<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Login Page</title>

    <!-- Tailwind + Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <section class="bg-white shadow-2xl rounded-xl w-4/12 mx-auto space-y-4 m-10 p-6">
        <div class="text-center items-center">
            <img src="./assets/github-logo.png" alt="github logo" class="mx-auto mb-4">
            <h2 class="text-2xl font-semibold ">GitHub Issues Tracker</h2>
            <p class="text-gray-500">Sign in to manage your issues</p>
        </div>

        <!-- login form -->
        <div>
            <fieldset class="fieldset bg-white rounded-box w-full p-4 mx-auto">

                <label class="label text-black font-semibold">Username</label>
                <input type="text" class="input w-full" placeholder="Enter Username" />

                <label class="label text-black font-semibold">Password</label>
                <input type="password" class="input w-full" placeholder="Enter Password" />

                <button id="sign-in-btn" class="btn btn-primary mt-4">Sign in</button>
            </fieldset>
        </div>

        <!-- or  -->
        <div class="flex w-full flex-col">
            <div class="divider mt-1">OR</div>
            <div class="card rounded-box text-center p-4">
                <p class="mb-2 text-gray-500 text-sm">Demo credential:</p> 
                <div class="bg-base-300 mx-auto text-center w-full p-6">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>
        </div>

    </section>

</body>

</html>
